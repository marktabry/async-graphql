input InputType @a @b {
	a: String! @input_a(test: 5)
}

type OutputType implements TestInterface @type {
	id: String! @test
	name: String!
	body: String
}

type OutputType2 {
	a: [Int!]!
}

type Query {
	interface(x: TestEnum @validate): TestInterface!
	output_type(input: InputType!): OutputType
	enum(input: [TestEnum]!): TestEnum @pin
	union: TestUnion!
	scalar: TestScalar
}

enum TestEnum @oneOf {
	A
	B @default
	C
}

interface TestInterface @test(a: 5, b: true, c: "str") @testDirective(prefix: "prefix") {
	id: String! @id @testDirective(prefix: "prefix")
	name: String!
}

scalar TestScalar @json

union TestUnion @wrap = OutputType | OutputType2

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Concatenates a string
"""
directive @testDirective(prefix: String!) on ARGUMENT_DEFINITION | OBJECT | ENUM
schema {
	query: Query
}
